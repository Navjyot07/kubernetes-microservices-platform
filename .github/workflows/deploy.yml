name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          eval $(minikube docker-env)
          docker build -t fastapi-app:latest .

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
